<html>
    <head>
        <link rel="stylesheet" href="scorecard.css">

    </head>
    <body>
        <div class="scoreboard">
            <div id="timer">
                <h1>10:00</h1>
            </div>

           <div class="container">
              <div class="team">
                 <h1>HOME</h1>
                 <div class="score" id="home-score">0</div>
                 <div class="btn">
                   <button onclick="addPoints('home',1)">+1</button>
                   <button onclick="addPoints('home',2)">+2</button>
                   <button onclick="addPoints('home',3)">+3</button>
                 </div>
               </div>
              <div class="team">
                 <h1>GUEST</h1>
                 <div class="score" id="guest-score">0</div>
                 <div class="btn">
                   <button onclick="addPoints('guest',1)">+1</button>
                   <button onclick="addPoints('guest',2)">+2</button>
                   <button onclick="addPoints('guest',3)">+3</button>
                   </div>
              </div>
           
            </div>
               <div class="reset-container">
                   <button onclick="resetScore()">RESET</button>
               </div>
       </div>
         <script src = "scorecard.js"></script>
    </body>
</html>
